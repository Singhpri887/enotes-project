<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: Layout(~{::title}, ~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>Edit Note - Enotes</title>
</head>

<section class="d-flex align-items-center" style="min-height: 90vh;">
    <div class="container">
        <div class="row align-items-center justify-content-center">
            <div class="col-lg-5 d-none d-lg-block">
                <div class="slide-up text-center">
                    <img th:src="@{/img/notes_hero.png}" alt="Edit Notes" class="img-fluid floating-animation"
                        style="max-height: 450px; filter: drop-shadow(0 0 15px rgba(255, 0, 128, 0.15));">
                </div>
            </div>
            <div class="col-lg-7">
                <div class="glass-card fade-in">
                    <div class="text-center mb-4">
                        <h3 class="fw-bold text-primary">Edit Note</h3>
                    </div>

                    <form action="/user/updateNotes" method="post">
                        <div class="mb-4">
                            <label class="form-label">Note Title</label>
                            <input type="text" name="title" th:value="${n.title}" class="form-control">
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Description</label>
                            <textarea rows="6" class="form-control" name="description">[[${n.description}]]</textarea>
                        </div>

                        <input type="hidden" name="id" th:value="${n.id}">
                        <button class="btn btn-primary px-5 mx-auto d-block">Update Note</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

</html>
