<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: Layout(~{::title}, ~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>Goals & Plans - Enotes</title>
</head>

<body>
    <section>
        <div class="container-fluid p-4">
            <!-- Hero Section -->
            <div class="row align-items-center mb-5">
                <div class="col-md-8">
                    <div class="glass-card p-4 fade-in d-flex align-items-center justify-content-between">
                        <div>
                            <h2 class="fw-bold text-primary mb-2">Goals & Plans</h2>
                            <p class="text-white mb-0">Set ambitious goals and map out your success.</p>
                        </div>
                        <div class="d-none d-md-block">
                            <img th:src="@{/img/home_hero.png}" alt="Goals" class="img-fluid floating-animation"
                                style="max-height: 150px; filter: drop-shadow(0 0 10px rgba(37, 117, 252, 0.2));">
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="glass-card p-4 fade-in text-center h-100 d-flex flex-column justify-content-center">
                        <button class="btn btn-primary btn-lg w-100"><i class="fa-solid fa-bullseye me-2"></i>Set New
                            Goal</button>
                    </div>
                </div>
            </div>

            <!-- Content Section -->
            <div class="row">
                <div class="col-md-4 mb-4">
                    <div class="glass-card p-4 fade-in">
                        <h4 class="text-primary fw-bold mb-3"><i class="fa-solid fa-bullseye me-2"></i>Set Goal</h4>
                        <form action="saveNotes" method="post">
                            <input type="hidden" name="category" value="GOAL">
                            <div class="mb-3">
                                <label class="form-label text-white">Goal Title</label>
                                <input type="text" name="title" class="form-control" required
                                    placeholder="e.g. Learn Java">
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-white">Action Plan</label>
                                <textarea rows="5" name="description" class="form-control" required
                                    placeholder="Steps to achieve this..."></textarea>
                            </div>
                            <button class="btn btn-primary w-100">Set Goal</button>
                        </form>
                    </div>
                </div>

                <div class="col-md-8">
                    <div th:if="${#lists.isEmpty(notesList)}" class="text-center text-white py-5 glass-card">
                        <h4>No goals yet</h4>
                    </div>

                    <div class="row">
                        <div th:each="n : ${notesList}" class="col-md-6 mb-4 fade-in">
                            <div class="glass-card h-100 p-4 border-start border-5 border-success position-relative">
                                <h5 class="fw-bold text-white mb-3">[[${n.title}]]</h5>
                                <p class="text-white small mb-4">[[${n.description}]]</p>
                                <div
                                    class="d-flex justify-content-between align-items-center mt-auto pt-3 border-top border-light">
                                    <span class="badge bg-success bg-opacity-10 text-success"><i
                                            class="fa-solid fa-flag me-1"></i>[[${n.date}]]</span>
                                    <div>
                                        <a th:href="@{'editNotes/'+${n.id}}" class="btn btn-sm text-primary"><i
                                                class="fa-solid fa-pen"></i></a>
                                        <a th:href="@{'deleteNotes/'+${n.id}}" class="btn btn-sm text-danger"><i
                                                class="fa-solid fa-trash"></i></a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
