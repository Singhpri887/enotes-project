<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: Layout(~{::title}, ~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>Daily Diary - Enotes</title>
</head>

<body>
    <section>
        <div class="container-fluid p-4">
            <!-- Hero Section -->
            <div class="row align-items-center mb-5">
                <div class="col-md-8">
                    <div class="glass-card p-4 fade-in d-flex align-items-center justify-content-between">
                        <div>
                            <h2 class="fw-bold text-primary mb-2">Daily Diary</h2>
                            <p class="text-white mb-0">Capture your daily moments, thoughts, and memories.</p>
                        </div>
                        <div class="d-none d-md-block">
                            <img th:src="@{/img/diary_hero.png}" alt="Diary" class="img-fluid floating-animation"
                                style="max-height: 150px; filter: drop-shadow(0 0 10px rgba(37, 117, 252, 0.2));">
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="glass-card p-4 fade-in text-center h-100 d-flex flex-column justify-content-center">
                        <button class="btn btn-primary btn-lg w-100"><i class="fa-solid fa-pen-fancy me-2"></i>Write
                            Today's Entry</button>
                    </div>
                </div>
            </div>

            <!-- Content Section -->
            <div class="row">
                <!-- Write Entry Column -->
                <div class="col-md-4 mb-4">
                    <div class="glass-card p-4 fade-in">
                        <h4 class="text-primary fw-bold mb-3"><i class="fa-solid fa-pen-nib me-2"></i>New Entry</h4>
                        <form action="saveNotes" method="post">
                            <input type="hidden" name="category" value="DIARY">
                            <div class="mb-3">
                                <label class="form-label text-white">Title (or "Dear Diary...")</label>
                                <input type="text" name="title" class="form-control" required placeholder="Day 1...">
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-white">Your Thoughts</label>
                                <textarea rows="10" name="description" class="form-control" required
                                    placeholder="Today was..."></textarea>
                            </div>
                            <button class="btn btn-primary w-100">Save Entry</button>
                        </form>
                    </div>
                </div>

                <!-- Entries List Column -->
                <div class="col-md-8">
                    <h4 class="text-primary fw-bold mb-3">Past Entries</h4>

                    <div th:if="${totalElements == 0}" class="text-center text-white py-5">
                        <div class="glass-card p-5">
                            <i class="fa-solid fa-book-open fa-3x mb-3 text-secondary opacity-50"></i>
                            <h4>Your diary is empty</h4>
                            <p>Start writing to see your entries here.</p>
                        </div>
                    </div>

                    <div th:each="n : ${notesList}" class="glass-card p-4 mb-3 fade-in position-relative">
                        <div
                            class="d-flex justify-content-between align-items-center mb-2 border-bottom border-secondary border-opacity-10 pb-2">
                            <h5 class="fw-bold text-white mb-0">[[${n.title}]]</h5>
                            <span
                                class="badge bg-white bg-opacity-10 text-primary border border-primary border-opacity-25 rounded-pill px-3 py-1 fw-normal">
                                [[${n.date}]]
                            </span>
                        </div>
                        <p class="text-white mb-3" style="white-space: pre-wrap;">[[${n.description}]]</p>
                        <div class="text-end">
                            <a th:href="@{'editNotes/'+${n.id}}"
                                class="btn btn-outline-primary btn-sm rounded-circle p-2 me-1"><i
                                    class="fa-solid fa-pen"></i></a>
                            <a th:href="@{'deleteNotes/'+${n.id}}"
                                class="btn btn-outline-danger btn-sm rounded-circle p-2"><i
                                    class="fa-solid fa-trash"></i></a>
                        </div>
                    </div>

                    <!-- Pagination -->
                    <nav th:if="${totalPages > 1}" aria-label="Page navigation" class="mt-4">
                        <ul class="pagination justify-content-center mb-0">
                            <li th:if="${currentPage!=0}" class="page-item">
                                <a class="page-link border-0 me-1"
                                    th:href="@{'/user/diary?pageNo=' + ${currentPage - 1}}">Previous</a>
                            </li>
                            <li class="page-item active">
                                <span class="page-link border-0">[[${currentPage + 1}]]</span>
                            </li>
                            <li th:if="${currentPage+1!=totalPages}" class="page-item">
                                <a class="page-link border-0"
                                    th:href="@{'/user/diary?pageNo=' + ${currentPage + 1}}">Next</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
