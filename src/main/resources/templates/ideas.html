<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: Layout(~{::title}, ~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>Ideas & Thoughts - Enotes</title>
</head>

<body>
    <section>
        <div class="container-fluid p-4">
            <!-- Hero Section -->
            <div class="row align-items-center mb-5">
                <div class="col-md-8">
                    <div class="glass-card p-4 fade-in d-flex align-items-center justify-content-between">
                        <div>
                            <h2 class="fw-bold text-primary mb-2">Ideas & Thoughts</h2>
                            <p class="text-white mb-0">Don't let your brilliant ideas escape. Capture them here.</p>
                        </div>
                        <div class="d-none d-md-block">
                            <img th:src="@{/img/notes_hero.png}" alt="Ideas" class="img-fluid floating-animation"
                                style="max-height: 150px; filter: drop-shadow(0 0 10px rgba(37, 117, 252, 0.2));">
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="glass-card p-4 fade-in text-center h-100 d-flex flex-column justify-content-center">
                        <button class="btn btn-primary btn-lg w-100"><i class="fa-solid fa-lightbulb me-2"></i>Capture
                            Idea</button>
                    </div>
                </div>
            </div>

            <!-- Content Section -->
            <div class="row">
                <div class="col-12 mb-5">
                    <div class="glass-card p-4 fade-in">
                        <form action="saveNotes" method="post" class="d-md-flex align-items-start gap-3">
                            <input type="hidden" name="category" value="IDEA">
                            <div class="flex-grow-1 mb-3 mb-md-0">
                                <input type="text" name="title" class="form-control mb-2" required
                                    placeholder="Idea Title">
                                <textarea rows="2" name="description" class="form-control"
                                    placeholder="Elaborate your idea..."></textarea>
                            </div>
                            <button class="btn btn-primary px-4 py-3 h-100"><i
                                    class="fa-solid fa-lightbulb me-2"></i>Save Idea</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="row masonry-grid">
                <div th:each="n : ${notesList}" class="col-md-4 mb-4 fade-in">
                    <div class="glass-card p-4 h-100 position-relative" style="background: rgba(255, 255, 200, 0.3);">
                        <i
                            class="fa-regular fa-lightbulb position-absolute top-0 end-0 m-3 text-warning opacity-50 fa-2x"></i>
                        <h5 class="fw-bold text-white pt-2">[[${n.title}]]</h5>
                        <p class="text-white mt-3">[[${n.description}]]</p>
                        <div class="mt-3 text-end opacity-50 hover-opacity-100 transition-opacity">
                            <a th:href="@{'editNotes/'+${n.id}}" class="text-white me-2"><i
                                    class="fa-solid fa-pen"></i></a>
                            <a th:href="@{'deleteNotes/'+${n.id}}" class="text-danger"><i
                                    class="fa-solid fa-trash"></i></a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
